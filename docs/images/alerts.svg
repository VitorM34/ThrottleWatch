<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#060C18"/>
  <rect x="0" y="0" width="180" height="500" fill="#0A1020"/>
  <rect x="16" y="16" width="36" height="36" rx="8" fill="#1E3A5F"/>
  <text x="34" y="39" font-family="system-ui" font-size="13" font-weight="700" fill="#60A5FA" text-anchor="middle">TW</text>
  <text x="64" y="38" font-family="system-ui" font-size="12" font-weight="700" fill="#F1F5F9">ThrottleWatch</text>
  <text x="38" y="91" font-family="system-ui" font-size="11" fill="#64748B">Overview</text>
  <text x="38" y="115" font-family="system-ui" font-size="11" fill="#64748B">Endpoints</text>
  <text x="38" y="139" font-family="system-ui" font-size="11" fill="#64748B">Clients</text>
  <text x="38" y="163" font-family="system-ui" font-size="11" fill="#64748B">Policies</text>
  <rect x="8" y="174" width="164" height="30" rx="6" fill="#431407"/>
  <text x="38" y="193" font-family="system-ui" font-size="11" fill="#FB923C" font-weight="600">Alerts</text>
  <text x="38" y="217" font-family="system-ui" font-size="11" fill="#64748B">Insights</text>

  <rect x="180" y="0" width="620" height="52" fill="#0D1117"/>
  <line x1="180" y1="52" x2="800" y2="52" stroke="#1E293B" stroke-width="1"/>
  <text x="196" y="33" font-family="system-ui" font-size="14" font-weight="700" fill="#F1F5F9">Alerts &amp; Notifications</text>

  <!-- Alert cards -->
  <!-- Alert 1 - Critical -->
  <rect x="192" y="66" width="590" height="80" rx="8" fill="#1A0A0A" stroke="#EF4444" stroke-width="1"/>
  <rect x="192" y="66" width="4" height="80" rx="2" fill="#EF4444"/>
  <text x="210" y="86" font-family="system-ui" font-size="11" font-weight="700" fill="#FCA5A5">CRITICAL  -  High Block Rate Detected</text>
  <text x="210" y="104" font-family="system-ui" font-size="10" fill="#94A3B8">POST /api/login block rate exceeded 10% threshold (current: 12.6%)  -  Policy: LoginRateLimit</text>
  <text x="210" y="120" font-family="system-ui" font-size="9.5" fill="#64748B">2 minutes ago  via Slack + Webhook</text>
  <rect x="696" y="76" width="72" height="20" rx="10" fill="#7F1D1D"/>
  <text x="732" y="89" font-family="system-ui" font-size="9.5" fill="#FCA5A5" text-anchor="middle">Critical</text>

  <!-- Alert 2 - Warning -->
  <rect x="192" y="158" width="590" height="80" rx="8" fill="#1A1100" stroke="#F59E0B" stroke-width="1"/>
  <rect x="192" y="158" width="4" height="80" rx="2" fill="#F59E0B"/>
  <text x="210" y="178" font-family="system-ui" font-size="11" font-weight="700" fill="#FCD34D">WARNING  -  Unusual Traffic Spike</text>
  <text x="210" y="196" font-family="system-ui" font-size="10" fill="#94A3B8">GET /api/orders received 3.2x normal traffic in the last 5 minutes (125k vs avg 39k)</text>
  <text x="210" y="212" font-family="system-ui" font-size="9.5" fill="#64748B">18 minutes ago  via Email</text>
  <rect x="696" y="168" width="72" height="20" rx="10" fill="#451A03"/>
  <text x="732" y="181" font-family="system-ui" font-size="9.5" fill="#FCD34D" text-anchor="middle">Warning</text>

  <!-- Alert 3 - Resolved -->
  <rect x="192" y="250" width="590" height="80" rx="8" fill="#0A1A0A" stroke="#22C55E" stroke-width="1"/>
  <rect x="192" y="250" width="4" height="80" rx="2" fill="#22C55E"/>
  <text x="210" y="270" font-family="system-ui" font-size="11" font-weight="700" fill="#4ADE80">RESOLVED  -  Block Rate Normalized</text>
  <text x="210" y="288" font-family="system-ui" font-size="10" fill="#94A3B8">POST /api/checkout block rate returned below threshold (0.48%)  -  alert auto-resolved</text>
  <text x="210" y="304" font-family="system-ui" font-size="9.5" fill="#64748B">1 hour ago  via Webhook</text>
  <rect x="696" y="260" width="72" height="20" rx="10" fill="#14532D"/>
  <text x="732" y="273" font-family="system-ui" font-size="9.5" fill="#4ADE80" text-anchor="middle">Resolved</text>

  <!-- Alert 4 - Info -->
  <rect x="192" y="342" width="590" height="80" rx="8" fill="#0A0F1A" stroke="#3B82F6" stroke-width="1"/>
  <rect x="192" y="342" width="4" height="80" rx="2" fill="#3B82F6"/>
  <text x="210" y="362" font-family="system-ui" font-size="11" font-weight="700" fill="#93C5FD">INFO  -  New IP Flagged</text>
  <text x="210" y="380" font-family="system-ui" font-size="10" fill="#94A3B8">IP 203.0.113.45 triggered rate limit 8,700 times in the last hour. Consider blocking.</text>
  <text x="210" y="396" font-family="system-ui" font-size="9.5" fill="#64748B">2 hours ago  via Discord</text>
  <rect x="696" y="352" width="72" height="20" rx="10" fill="#1E3A5F"/>
  <text x="732" y="365" font-family="system-ui" font-size="9.5" fill="#93C5FD" text-anchor="middle">Info</text>
</svg>
