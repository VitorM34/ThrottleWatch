  <path d="M100 31 L152 54 L152 113 Q152 149 100 168 Q48 149 48 113 L48 54 Z"
        stroke="url(#border)" stroke-width="0.5" opacity="0.28"/>

  <line x1="15" y1="78"  x2="66" y2="78"  stroke="#93C5FD" stroke-width="2"   stroke-linecap="round" filter="url(#fl)"/>
  <polygon points="70,78 64,74.5 64,81.5"  fill="#93C5FD" filter="url(#fl)"/>
  <line x1="11" y1="94"  x2="66" y2="94"  stroke="#A5B4FC" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <polygon points="70,94 64,90.5 64,97.5"  fill="#A5B4FC" opacity="0.85"/>
  <line x1="15" y1="110" x2="66" y2="110" stroke="#C4B5FD" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
  <polygon points="70,110 64,106.5 64,113.5" fill="#C4B5FD" opacity="0.6"/>

  <rect x="77"  y="120" width="12" height="32" rx="2.5" fill="url(#b1)" filter="url(#fb)"/>
  <rect x="94"  y="103" width="12" height="49" rx="2.5" fill="url(#b2)"/>
  <rect x="111" y="88"  width="12" height="64" rx="2.5" fill="url(#b3)" filter="url(#fb)"/>
  <rect x="128" y="110" width="12" height="42" rx="2.5" fill="url(#b4)"/>

  <line x1="75" y1="110" x2="142" y2="110"
        stroke="#FCD34D" stroke-width="1.4" stroke-dasharray="3.8,2.6" opacity="0.9" filter="url(#fl)"/>
  <circle cx="117" cy="109.5" r="3.2" fill="#FCD34D" opacity="0.9" filter="url(#fl)"/>
