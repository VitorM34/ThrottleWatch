<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="outer-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0C1A30"/>
      <stop offset="100%" stop-color="#120B27"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#60A5FA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#BAE6FD"/><stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C7D2FE"/><stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#DDD6FE"/><stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C4B5FD"/><stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="fg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fb" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="100" cy="105" rx="70" ry="74" fill="url(#outer-glow)"/>

  <path d="M100 18 L163 45 L163 113 Q163 158 100 182 Q37 158 37 113 L37 45 Z" fill="url(#fill)"/>
  <path d="M100 18 L163 45 L163 113 Q163 158 100 182 Q37 158 37 113 L37 45 Z" fill="url(#inner)"/>
  <path d="M100 18 L163 45 L163 113 Q163 158 100 182 Q37 158 37 113 L37 45 Z"
