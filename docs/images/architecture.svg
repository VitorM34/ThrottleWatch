<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 630" width="600" height="630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060C18"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="gb1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="gb2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/><stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="gb3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="gb4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="gb5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="gb6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/><stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <linearGradient id="gb7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="fglow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#1E293B"/>
    </pattern>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 Z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="630" fill="url(#bg)"/>
  <rect width="600" height="630" fill="url(#dots)" opacity="0.45"/>

  <!-- Title -->
  <text x="300" y="34" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="700" fill="#64748B" text-anchor="middle" letter-spacing="4">
    REQUEST PIPELINE
  </text>
  <line x1="60" y1="46" x2="540" y2="46" stroke="#1E293B" stroke-width="1"/>

  <!-- BOX 1: ASP.NET Core API -->
  <rect x="60" y="58" width="480" height="62" rx="10" fill="#0D1829"/>
  <rect x="60" y="58" width="480" height="62" rx="10" stroke="url(#gb1)" stroke-width="1.2"/>
  <rect x="60" y="58" width="4"   height="62" rx="2"  fill="url(#gb1)"/>
  <text x="82" y="82" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#F1F5F9">ASP.NET Core API</text>
  <text x="82" y="101" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748B">Incoming HTTP requests with rate limit policies configured</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="120" x2="300" y2="140" stroke="#2563EB" stroke-width="1.5"
        opacity="0.6" marker-end="url(#arrowhead)"/>
  <text x="310" y="133" font-family="'SF Mono',Consolas,monospace" font-size="9" fill="#334155">request</text>

  <!-- BOX 2: ThrottleWatch Middleware -->
  <rect x="60" y="142" width="480" height="62" rx="10" fill="#0D1829"/>
  <rect x="60" y="142" width="480" height="62" rx="10" stroke="url(#gb2)" stroke-width="1.2"/>
  <rect x="60" y="142" width="4"   height="62" rx="2"  fill="url(#gb2)"/>
  <text x="82" y="166" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#F1F5F9">ThrottleWatch Middleware</text>
  <text x="82" y="185" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748B">Intercepts requests, records metrics, evaluates rate limit policies</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="204" x2="300" y2="224" stroke="#6366F1" stroke-width="1.5"
        opacity="0.6" marker-end="url(#arrowhead)"/>
  <text x="310" y="217" font-family="'SF Mono',Consolas,monospace" font-size="9" fill="#334155">enqueue</text>

  <!-- BOX 3: In-Memory Queue -->
  <rect x="60" y="226" width="480" height="62" rx="10" fill="#0D1829"/>
  <rect x="60" y="226" width="480" height="62" rx="10" stroke="url(#gb3)" stroke-width="1.2"/>
  <rect x="60" y="226" width="4"   height="62" rx="2"  fill="url(#gb3)"/>
  <text x="82" y="250" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#F1F5F9">In-Memory Queue</text>
  <text x="82" y="269" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748B">Thread-safe channel for high-throughput, non-blocking buffering</text>

  <!-- Arrow 3 -->
  <line x1="300" y1="288" x2="300" y2="308" stroke="#06B6D4" stroke-width="1.5"
        opacity="0.6" marker-end="url(#arrowhead)"/>
  <text x="310" y="301" font-family="'SF Mono',Consolas,monospace" font-size="9" fill="#334155">dequeue</text>

  <!-- BOX 4: Background Worker -->
  <rect x="60" y="310" width="480" height="62" rx="10" fill="#0D1829"/>
  <rect x="60" y="310" width="480" height="62" rx="10" stroke="url(#gb4)" stroke-width="1.2"/>
  <rect x="60" y="310" width="4"   height="62" rx="2"  fill="url(#gb4)"/>
  <text x="82" y="334" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#F1F5F9">Background Worker</text>
  <text x="82" y="353" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748B">IHostedService  aggregates batches and persists metrics</text>

  <!-- Arrow 4 -->
  <line x1="300" y1="372" x2="300" y2="392" stroke="#10B981" stroke-width="1.5"
        opacity="0.6" marker-end="url(#arrowhead)"/>
  <text x="310" y="385" font-family="'SF Mono',Consolas,monospace" font-size="9" fill="#334155">persist</text>

  <!-- BOX 5: PostgreSQL -->
  <rect x="60" y="394" width="480" height="62" rx="10" fill="#0D1829"/>
  <rect x="60" y="394" width="480" height="62" rx="10" stroke="url(#gb5)" stroke-width="1.2"/>
  <rect x="60" y="394" width="4"   height="62" rx="2"  fill="url(#gb5)"/>
  <text x="82" y="418" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#F1F5F9">PostgreSQL + EF Core</text>
  <text x="82" y="437" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748B">Stores requests, blocks, policies and time-series analytics</text>

  <!-- Arrow 5 -->
  <line x1="300" y1="456" x2="300" y2="476" stroke="#F59E0B" stroke-width="1.5"
        opacity="0.6" marker-end="url(#arrowhead)"/>
  <text x="310" y="469" font-family="'SF Mono',Consolas,monospace" font-size="9" fill="#334155">broadcast</text>

  <!-- BOX 6: SignalR Hub -->
  <rect x="60" y="478" width="480" height="62" rx="10" fill="#0D1829"/>
  <rect x="60" y="478" width="480" height="62" rx="10" stroke="url(#gb6)" stroke-width="1.2"/>
  <rect x="60" y="478" width="4"   height="62" rx="2"  fill="url(#gb6)"/>
  <text x="82" y="502" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#F1F5F9">SignalR Hub</text>
  <text x="82" y="521" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748B">Real-time event streaming to connected dashboard clients</text>

  <!-- Arrow 6 -->
  <line x1="300" y1="540" x2="300" y2="560" stroke="#EC4899" stroke-width="1.5"
        opacity="0.6" marker-end="url(#arrowhead)"/>
  <text x="310" y="553" font-family="'SF Mono',Consolas,monospace" font-size="9" fill="#334155">render</text>

  <!-- BOX 7: Dashboard -->
  <rect x="60" y="562" width="480" height="50" rx="10" fill="#0D1829"/>
  <rect x="60" y="562" width="480" height="50" rx="10" stroke="url(#gb7)" stroke-width="1.5" filter="url(#fglow)"/>
  <rect x="60" y="562" width="4"   height="50" rx="2"  fill="url(#gb7)"/>
  <text x="82" y="586" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#F1F5F9">Dashboard (Blazor Server)</text>
  <text x="82" y="603" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748B">Live charts, metrics, alerts and insights updated in real time</text>
</svg>
