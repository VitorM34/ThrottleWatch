<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 610" width="520" height="610" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="520" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060C18"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Box border gradients -->
    <linearGradient id="gb1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="gb2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/><stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="gb3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="gb4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="gb5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="gb6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/><stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <linearGradient id="gb7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="fglow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ftext" x="-5%" y="-15%" width="110%" height="130%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#1E293B"/>
    </pattern>
    <marker id="arrow-head" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="#4B5563"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="520" height="610" fill="url(#bg)"/>
  <rect width="520" height="610" fill="url(#dots)" opacity="0.5"/>

  <!-- Title -->
  <text x="260" y="34" font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="16" font-weight="700" fill="#94A3B8" text-anchor="middle" letter-spacing="3">
    REQUEST PIPELINE
  </text>
  <line x1="80" y1="44" x2="440" y2="44" stroke="#1E293B" stroke-width="1"/>

  <!--  Box helper macro (drawn manually per box)  -->
  <!-- Each box: rect (fill dark) + rect (left accent border 3px) + icon + label + description -->

  <!-- BOX 1: ASP.NET Core API -->
  <rect x="80" y="56" width="360" height="62" rx="10" fill="#0D1829" stroke-width="0"/>
  <rect x="80" y="56" width="360" height="62" rx="10" stroke="url(#gb1)" stroke-width="1.2"/>
  <rect x="80" y="56" width="4"   height="62" rx="2"  fill="url(#gb1)"/>
  <text x="116" y="81" font-family="system-ui,sans-serif" font-size="11" fill="#3B82F6" font-weight="600">[API]</text>
  <text x="138" y="81" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#F1F5F9">ASP.NET Core API</text>
  <text x="138" y="100" font-family="system-ui,sans-serif" font-size="11.5" fill="#64748B">Incoming HTTP request with rate limit policies configured</text>

  <!-- Arrow 12 -->
  <line x1="260" y1="118" x2="260" y2="138" stroke="#2563EB" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow-head)"/>
  <text x="270" y="131" font-family="'SF Mono',Consolas,monospace" font-size="9.5" fill="#334155">request</text>

  <!-- BOX 2: ThrottleWatch Middleware -->
  <rect x="80" y="140" width="360" height="62" rx="10" fill="#0D1829"/>
  <rect x="80" y="140" width="360" height="62" rx="10" stroke="url(#gb2)" stroke-width="1.2"/>
  <rect x="80" y="140" width="4"   height="62" rx="2"  fill="url(#gb2)"/>
  <text x="116" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#818CF8" font-weight="600">[MW]</text>
  <text x="138" y="165" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#F1F5F9">ThrottleWatch Middleware</text>
  <text x="138" y="184" font-family="system-ui,sans-serif" font-size="11.5" fill="#64748B">Intercepts requests, captures metrics, evaluates rate limits</text>

  <!-- Arrow 23 -->
  <line x1="260" y1="202" x2="260" y2="222" stroke="#6366F1" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow-head)"/>
  <text x="270" y="215" font-family="'SF Mono',Consolas,monospace" font-size="9.5" fill="#334155">enqueue</text>

  <!-- BOX 3: In-Memory Queue -->
  <rect x="80" y="224" width="360" height="62" rx="10" fill="#0D1829"/>
  <rect x="80" y="224" width="360" height="62" rx="10" stroke="url(#gb3)" stroke-width="1.2"/>
  <rect x="80" y="224" width="4"   height="62" rx="2"  fill="url(#gb3)"/>
  <text x="116" y="249" font-family="system-ui,sans-serif" font-size="11" fill="#06B6D4" font-weight="600">[Q]</text>
  <text x="138" y="249" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#F1F5F9">In-Memory Queue</text>
  <text x="138" y="268" font-family="system-ui,sans-serif" font-size="11.5" fill="#64748B">Thread-safe channel for high-throughput event buffering</text>

  <!-- Arrow 34 -->
  <line x1="260" y1="286" x2="260" y2="306" stroke="#06B6D4" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow-head)"/>
  <text x="270" y="299" font-family="'SF Mono',Consolas,monospace" font-size="9.5" fill="#334155">dequeue</text>

  <!-- BOX 4: Background Worker -->
  <rect x="80" y="308" width="360" height="62" rx="10" fill="#0D1829"/>
  <rect x="80" y="308" width="360" height="62" rx="10" stroke="url(#gb4)" stroke-width="1.2"/>
  <rect x="80" y="308" width="4"   height="62" rx="2"  fill="url(#gb4)"/>
  <text x="116" y="333" font-family="system-ui,sans-serif" font-size="11" fill="#10B981" font-weight="600">[W]</text>
  <text x="138" y="333" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#F1F5F9">Background Worker</text>
  <text x="138" y="352" font-family="system-ui,sans-serif" font-size="11.5" fill="#64748B">IHostedService aggregates batches and persists metrics</text>

  <!-- Arrow 45 -->
  <line x1="260" y1="370" x2="260" y2="390" stroke="#10B981" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow-head)"/>
  <text x="270" y="383" font-family="'SF Mono',Consolas,monospace" font-size="9.5" fill="#334155">persist</text>

  <!-- BOX 5: PostgreSQL -->
  <rect x="80" y="392" width="360" height="62" rx="10" fill="#0D1829"/>
  <rect x="80" y="392" width="360" height="62" rx="10" stroke="url(#gb5)" stroke-width="1.2"/>
  <rect x="80" y="392" width="4"   height="62" rx="2"  fill="url(#gb5)"/>
  <text x="116" y="417" font-family="system-ui,sans-serif" font-size="11" fill="#F59E0B" font-weight="600">[DB]</text>
  <text x="138" y="417" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#F1F5F9">PostgreSQL + EF Core</text>
  <text x="138" y="436" font-family="system-ui,sans-serif" font-size="11.5" fill="#64748B">Stores requests, blocks, policies and aggregated history</text>

  <!-- Arrow 56 -->
  <line x1="260" y1="454" x2="260" y2="474" stroke="#F59E0B" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow-head)"/>
  <text x="270" y="467" font-family="'SF Mono',Consolas,monospace" font-size="9.5" fill="#334155">broadcast</text>

  <!-- BOX 6: SignalR Hub -->
  <rect x="80" y="476" width="360" height="62" rx="10" fill="#0D1829"/>
  <rect x="80" y="476" width="360" height="62" rx="10" stroke="url(#gb6)" stroke-width="1.2"/>
  <rect x="80" y="476" width="4"   height="62" rx="2"  fill="url(#gb6)"/>
  <text x="116" y="501" font-family="system-ui,sans-serif" font-size="11" fill="#EC4899" font-weight="600">[MW]</text>
  <text x="138" y="501" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#F1F5F9">SignalR Hub</text>
  <text x="138" y="520" font-family="system-ui,sans-serif" font-size="11.5" fill="#64748B">Real-time event streaming to connected dashboard clients</text>

  <!-- Arrow 67 -->
  <line x1="260" y1="538" x2="260" y2="558" stroke="#EC4899" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow-head)"/>
  <text x="270" y="551" font-family="'SF Mono',Consolas,monospace" font-size="9.5" fill="#334155">render</text>

  <!-- BOX 7: Blazor Dashboard -->
  <rect x="80" y="560" width="360" height="38" rx="10" fill="#0D1829"/>
  <rect x="80" y="560" width="360" height="38" rx="10" stroke="url(#gb7)" stroke-width="1.5" filter="url(#fglow)"/>
  <rect x="80" y="560" width="4"   height="38" rx="2"  fill="url(#gb7)"/>
  <text x="116" y="582" font-family="system-ui,sans-serif" font-size="11" fill="#3B82F6" font-weight="600">[UI]</text>
  <text x="138" y="582" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#F1F5F9">Dashboard  (Blazor Server)</text>
</svg>
